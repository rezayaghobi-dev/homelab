services:
  pihole:
    container_name: pihole
    image: ghcr.io/pi-hole/pihole:latest
    network_mode: host
    env_file:
      - .env
    environment:
      TZ: "Asia/Tehran"
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
